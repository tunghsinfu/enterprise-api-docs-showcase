worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # 上游服務定義
    upstream swagger-api {
        server swagger-api:8080;
    }

    upstream restdocs-api {
        server restdocs-api:8080;
    }

    upstream restdocs-docs {
        server restdocs-docs:80;
    }

    upstream jenkins {
        server jenkins:8080;
    }

    # ──────────────────────────────────────────────
    # HTTP 服務器（統一入口）
    # ──────────────────────────────────────────────
    server {
        listen 80 default_server;
        server_name _;

        # 首頁 — 導覽入口
        location / {
            root /usr/share/nginx/html;
            index index.html;
        }

        # Swagger UI / OpenAPI 3 — 互動式沙盒
        location /swagger-ui/ {
            proxy_pass http://swagger-api/swagger-ui/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # OpenAPI 3 JSON 規格檔
        location /v3/api-docs {
            proxy_pass http://swagger-api/v3/api-docs;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 實例 API — 優先導向 Swagger 版
        location /api/ {
            proxy_pass http://swagger-api/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # REST Docs 靜態文件（測試驅動文件）
        location /docs/ {
            proxy_pass http://restdocs-docs/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Jenkins CI/CD
        location /jenkins/ {
            proxy_pass http://jenkins/jenkins/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Jenkins 需要以下 headers
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Server $host;
            proxy_max_temp_file_size 0;

            proxy_connect_timeout 150;
            proxy_send_timeout 100;
            proxy_read_timeout 100;
            proxy_buffering off;
            proxy_request_buffering off;
        }
    }
}
